name: Keep Alive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          curl -f ${{ secrets.RENDER_URL }}/ping || echo "Ping failed"

      - name: Ping Supabase
        run: |
          curl -f "${{ secrets.SUPABASE_URL }}/rest/v1/conversations?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            || echo "Supabase ping failed"
